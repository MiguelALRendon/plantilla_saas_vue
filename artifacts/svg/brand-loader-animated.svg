<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 24" width="120" height="24"
     role="img" aria-label="Cargando…">
  <title>Brand loader</title>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f33f8a"/>
      <stop offset="100%" stop-color="#8660b3"/>
    </linearGradient>
    <!-- Mask para animar el fill de izquierda a derecha -->
    <mask id="fill-mask">
      <rect id="mask-rect" x="0" y="0" width="0" height="24" fill="white">
        <animate attributeName="width" from="0" to="120"
                 dur="1.4s" fill="freeze"
                 calcMode="spline" keyTimes="0;1"
                 keySplines="0.4 0 0.2 1"/>
      </rect>
    </mask>
  </defs>

  <!-- Base: puntos y línea en gris muy suave (estado "vacío") -->
  <line x1="18" y1="12" x2="102" y2="12" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12"  cy="12" r="6" fill="#e0e0e0"/>
  <circle cx="60"  cy="12" r="6" fill="#e0e0e0"/>
  <circle cx="108" cy="12" r="6" fill="#e0e0e0"/>

  <!-- Capa animada: se revela de izquierda a derecha con la mask -->
  <g mask="url(#fill-mask)">
    <line x1="18" y1="12" x2="102" y2="12" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="12"  cy="12" r="6" fill="url(#g)"/>
    <circle cx="60"  cy="12" r="6" fill="url(#g)"/>
    <circle cx="108" cy="12" r="6" fill="url(#g)"/>
  </g>
</svg>
