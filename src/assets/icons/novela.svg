<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Novela">
  <title>Novela</title>
  <defs>
    <!-- Spine (left, shadow face) -->
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <!-- Front cover (lit face) -->
    <radialGradient id="cover" cx="32%" cy="25%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FEE2E2"/>
      <stop offset="28%"  stop-color="#fca5a5"/>
      <stop offset="60%"  stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </radialGradient>
    <!-- Page block (right) -->
    <linearGradient id="pages" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    <!-- Specular on cover -->
    <radialGradient id="spec" cx="32%" cy="25%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shd" x="-18%" y="-14%" width="136%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#7f1d1d" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Page block right face -->
    <polygon points="38,8 44,11 44,46 38,44" fill="url(#pages)"/>
    <!-- Page stack lines on right face -->
    <line x1="38" y1="14" x2="44" y2="16" stroke="#9ca3af" stroke-width="0.5" opacity="0.55"/>
    <line x1="38" y1="19" x2="44" y2="21" stroke="#9ca3af" stroke-width="0.5" opacity="0.45"/>
    <line x1="38" y1="24" x2="44" y2="26" stroke="#9ca3af" stroke-width="0.5" opacity="0.45"/>
    <line x1="38" y1="29" x2="44" y2="31" stroke="#9ca3af" stroke-width="0.5" opacity="0.45"/>
    <line x1="38" y1="34" x2="44" y2="36" stroke="#9ca3af" stroke-width="0.5" opacity="0.45"/>
    <line x1="38" y1="39" x2="44" y2="41" stroke="#9ca3af" stroke-width="0.5" opacity="0.45"/>
    <!-- Spine (left face) -->
    <rect x="4" y="8" width="8" height="36" rx="1.5" fill="url(#spine)"/>
    <!-- Front cover -->
    <rect x="12" y="8" width="26" height="36" rx="1" fill="url(#cover)"/>
    <!-- Specular on cover -->
    <rect x="12" y="8" width="26" height="36" rx="1" fill="url(#spec)"/>
    <!-- Cover top highlight edge -->
    <line x1="12" y1="8" x2="38" y2="8" stroke="white" stroke-width="1" opacity="0.55"/>
    <!-- Spine-cover edge line -->
    <line x1="12" y1="8" x2="12" y2="44" stroke="white" stroke-width="0.8" opacity="0.38"/>
    <!-- Decorative title lines on cover -->
    <rect x="16" y="16" width="18" height="2.5" rx="1.25" fill="white" opacity="0.65"/>
    <rect x="16" y="21" width="14" height="2" rx="1"    fill="white" opacity="0.42"/>
    <rect x="16" y="25" width="16" height="2" rx="1"    fill="white" opacity="0.38"/>
    <!-- Author line at bottom -->
    <rect x="16" y="36" width="12" height="1.8" rx="0.9" fill="white" opacity="0.35"/>
    <!-- Spine label -->
    <rect x="6" y="20" width="4" height="12" rx="0.8" fill="white" opacity="0.22"/>
  </g>
</svg>
