<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Imágenes">
  <title>Imágenes</title>
  <defs>
    <!-- Frame (sky/cyan) -->
    <radialGradient id="frame" cx="32%" cy="22%" r="78%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#E0F2FE"/>
      <stop offset="28%"  stop-color="#bae6fd"/>
      <stop offset="60%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <radialGradient id="spec-frame" cx="32%" cy="22%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Sky inside frame -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#BAE6FD"/>
      <stop offset="65%"  stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <!-- Grass inside frame -->
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <!-- Mountain gradient -->
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f1f5f9"/>
      <stop offset="45%"  stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Frame right depth face -->
    <linearGradient id="fside" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <filter id="shd" x="-16%" y="-14%" width="132%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#0c4a6e" flood-opacity="0.42"/>
    </filter>
    <clipPath id="inner">
      <rect x="9" y="9" width="30" height="26" rx="1"/>
    </clipPath>
  </defs>
  <g filter="url(#shd)">
    <!-- Frame right depth face -->
    <polygon points="39,6 45,9 45,42 39,44" fill="url(#fside)"/>
    <!-- Frame bottom depth -->
    <polygon points="5,38 39,38 45,42 5,42" fill="url(#fside)" opacity="0.70"/>
    <!-- Picture frame outer -->
    <rect x="5" y="6" width="34" height="32" rx="3" fill="url(#frame)"/>
    <!-- Specular on frame -->
    <rect x="5" y="6" width="34" height="32" rx="3" fill="url(#spec-frame)"/>
    <!-- Inner canvas (image area) -->
    <rect x="9" y="9" width="30" height="26" rx="1" fill="#dbeafe"/>
    <!-- Sky gradient inside image -->
    <rect x="9" y="9" width="30" height="18" rx="1" fill="url(#sky)" clip-path="url(#inner)"/>
    <!-- Grass strip -->
    <rect x="9" y="26" width="30" height="9" fill="url(#grass)" clip-path="url(#inner)"/>
    <!-- Mountain left -->
    <polygon points="9,30 18,14 28,30" fill="url(#mtn)" clip-path="url(#inner)"/>
    <!-- Mountain right (smaller) -->
    <polygon points="22,30 30,18 39,30" fill="url(#mtn)" clip-path="url(#inner)" opacity="0.80"/>
    <!-- Snow cap left mountain -->
    <polygon points="18,14 14,22 22,22" fill="white" opacity="0.70" clip-path="url(#inner)"/>
    <!-- Sun circle -->
    <circle cx="33" cy="14" r="4" fill="#fde68a" clip-path="url(#inner)"/>
    <circle cx="32" cy="13" r="1.5" fill="white" opacity="0.45" clip-path="url(#inner)"/>
    <!-- Frame top highlight -->
    <line x1="5" y1="6" x2="39" y2="6" stroke="white" stroke-width="1.2" opacity="0.55"/>
    <line x1="5" y1="6" x2="5" y2="38" stroke="white" stroke-width="1"   opacity="0.40"/>
    <!-- Frame right edge -->
    <line x1="39" y1="6" x2="39" y2="38" stroke="white" stroke-width="0.7" opacity="0.28"/>
    <!-- Stand/hanger at bottom center -->
    <rect x="17" y="38" width="10" height="3.5" rx="1.75" fill="#0369a1" opacity="0.60"/>
    <rect x="20" y="40.5" width="4" height="4" rx="1" fill="#0369a1" opacity="0.55"/>
    <rect x="19.5" y="44" width="5" height="1.5" rx="0.75" fill="#0369a1" opacity="0.45"/>
  </g>
</svg>
