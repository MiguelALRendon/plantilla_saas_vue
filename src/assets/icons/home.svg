<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Inicio">
  <title>Inicio</title>
  <defs>
    <!-- Roof front face (top-lit) -->
    <linearGradient id="rf" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#FEF9C3"/>
      <stop offset="50%"  stop-color="#fdc46c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Roof right face (shadow) -->
    <linearGradient id="rr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Wall front face -->
    <linearGradient id="wf" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="45%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <!-- Wall right face (shadow) -->
    <linearGradient id="wr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <!-- Chimney -->
    <linearGradient id="ch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shd" x="-20%" y="-15%" width="140%" height="145%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#78350f" flood-opacity="0.40"/>
    </filter>
    <radialGradient id="spec" cx="30%" cy="20%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#shd)">
    <!-- Right roof face (shadow, draw first) -->
    <polygon points="32,26 44,20 30,5 18,11" fill="url(#rr)"/>
    <!-- Front roof slope -->
    <polygon points="4,26 32,26 18,11" fill="url(#rf)"/>
    <!-- Specular on front roof -->
    <polygon points="4,26 18,11 22,16 8,27" fill="white" opacity="0.18"/>
    <!-- Ridge highlight -->
    <line x1="18" y1="11" x2="30" y2="5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <!-- Right wall (shadow) -->
    <polygon points="32,26 44,20 44,40 32,44" fill="url(#wr)"/>
    <!-- Front wall -->
    <rect x="4" y="26" width="28" height="18" fill="url(#wf)"/>
    <!-- Chimney (above roof, right side) -->
    <rect x="27" y="7" width="5.5" height="19" rx="1" fill="url(#ch)"/>
    <!-- Chimney right face -->
    <polygon points="32.5,7 36.5,5 36.5,24 32.5,26" fill="#d97706" opacity="0.70"/>
    <!-- Door -->
    <path d="M13,44 L13,35 Q17.5,32 22,35 L22,44 Z" fill="#92400e" opacity="0.55"/>
    <!-- Window left -->
    <rect x="5" y="29" width="7" height="5.5" rx="1.2" fill="#92400e" opacity="0.42"/>
    <!-- Window right -->
    <rect x="24" y="29" width="7" height="5.5" rx="1.2" fill="#92400e" opacity="0.42"/>
    <!-- Wall top edge highlight -->
    <line x1="4" y1="26" x2="32" y2="26" stroke="white" stroke-width="0.8" opacity="0.40"/>
  </g>
</svg>
