<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Notas">
  <title>Notas</title>
  <defs>
    <!-- Notepad top (yellow, lit) -->
    <radialGradient id="note" cx="30%" cy="22%" r="78%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FEF9C3"/>
      <stop offset="30%"  stop-color="#fde68a"/>
      <stop offset="65%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="spec" cx="30%" cy="22%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow fold triangle -->
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <!-- Right face depth -->
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Spiral rings -->
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <filter id="shd" x="-16%" y="-14%" width="132%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#78350f" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Right depth face -->
    <polygon points="38,6 44,9 44,44 38,44" fill="url(#side)"/>
    <!-- Main notepad body -->
    <rect x="6" y="6" width="32" height="38" rx="2" fill="url(#note)"/>
    <!-- Specular -->
    <rect x="6" y="6" width="32" height="38" rx="2" fill="url(#spec)"/>
    <!-- Top edge highlight -->
    <line x1="6" y1="6" x2="38" y2="6" stroke="white" stroke-width="1" opacity="0.55"/>
    <!-- Left margin line (red) -->
    <line x1="13" y1="6" x2="13" y2="44" stroke="#f87171" stroke-width="1.2" opacity="0.55"/>
    <!-- Hole punch circles on left -->
    <circle cx="9.5" cy="14" r="2.2" fill="#b45309" opacity="0.40"/>
    <circle cx="9.5" cy="24" r="2.2" fill="#b45309" opacity="0.40"/>
    <circle cx="9.5" cy="34" r="2.2" fill="#b45309" opacity="0.40"/>
    <!-- Text lines on notepad -->
    <rect x="16" y="13" width="18" height="2" rx="1" fill="#b45309" opacity="0.38"/>
    <rect x="16" y="18" width="14" height="2" rx="1" fill="#b45309" opacity="0.30"/>
    <rect x="16" y="23" width="16" height="2" rx="1" fill="#b45309" opacity="0.30"/>
    <rect x="16" y="28" width="12" height="2" rx="1" fill="#b45309" opacity="0.28"/>
    <rect x="16" y="33" width="15" height="2" rx="1" fill="#b45309" opacity="0.28"/>
    <!-- Folded corner bottom-right -->
    <polygon points="38,37 28,44 38,44" fill="url(#fold)"/>
    <polygon points="28,44 38,37 34,37 28,40" fill="white" opacity="0.18"/>
    <!-- Right side edge -->
    <line x1="38" y1="6" x2="38" y2="37" stroke="white" stroke-width="0.7" opacity="0.30"/>
  </g>
</svg>
