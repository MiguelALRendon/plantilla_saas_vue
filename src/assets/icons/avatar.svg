<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Perfil">
  <title>Perfil</title>
  <defs>
    <radialGradient id="body" cx="50%" cy="40%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#EDE9FE"/>
      <stop offset="30%"  stop-color="#c4b5fd"/>
      <stop offset="65%"  stop-color="#8660b3"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="head" cx="38%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#EDE9FE"/>
      <stop offset="35%"  stop-color="#c4b5fd"/>
      <stop offset="70%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="spec" cx="35%" cy="25%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shd" x="-18%" y="-12%" width="136%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#4c1d95" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Shoulders / body arc (bottom) -->
    <path d="M3,50 Q3,32 24,32 Q45,32 45,50 Z" fill="url(#body)"/>
    <!-- Body specular -->
    <path d="M3,50 Q3,32 24,32 Q45,32 45,50 Z" fill="url(#spec)"/>
    <!-- Body top edge highlight -->
    <path d="M5,46 Q15,33 24,32 Q33,33 43,46" fill="none" stroke="white" stroke-width="0.9" opacity="0.38"/>
    <!-- Head circle -->
    <circle cx="24" cy="19" r="12" fill="url(#head)"/>
    <!-- Head specular -->
    <circle cx="24" cy="19" r="12" fill="url(#spec)"/>
    <!-- Head top highlight (bright crescent) -->
    <path d="M15,14 Q20,9 28,11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <!-- Hair -->
    <ellipse cx="24" cy="9.5" rx="11" ry="4" fill="#4c1d95" opacity="0.42"/>
    <!-- Eyes -->
    <circle cx="20" cy="19" r="1.6" fill="#4c1d95" opacity="0.42"/>
    <circle cx="28" cy="19" r="1.6" fill="#4c1d95" opacity="0.42"/>
    <!-- Smile -->
    <path d="M19,23 Q24,27 29,23" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round" opacity="0.42"/>
  </g>
</svg>
