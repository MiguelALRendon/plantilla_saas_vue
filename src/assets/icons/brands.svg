<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Marcas">
  <title>Marcas</title>
  <defs>
    <radialGradient id="star" cx="38%" cy="30%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FEF9C3"/>
      <stop offset="28%"  stop-color="#fde68a"/>
      <stop offset="60%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Inner star highlight layer -->
    <radialGradient id="glow" cx="38%" cy="28%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shd" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#78350f" flood-opacity="0.42"/>
    </filter>
    <filter id="inner-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Star body -->
    <polygon points="24,3 29,17.5 44.5,17.5 32.5,26.5 37,41.5 24,32.8 11,41.5 15.5,26.5 3.5,17.5 19,17.5"
      fill="url(#star)"/>
    <!-- Specular glow -->
    <polygon points="24,3 29,17.5 44.5,17.5 32.5,26.5 37,41.5 24,32.8 11,41.5 15.5,26.5 3.5,17.5 19,17.5"
      fill="url(#glow)"/>
    <!-- Top-left bright facet highlight -->
    <polygon points="24,3 19,17.5 14,14" fill="white" opacity="0.30"/>
    <!-- Outer edge top highlight -->
    <line x1="19" y1="17.5" x2="24" y2="3" stroke="white" stroke-width="1" opacity="0.45"/>
    <line x1="24" y1="3" x2="29" y2="17.5" stroke="white" stroke-width="0.7" opacity="0.25"/>
  </g>
</svg>
