<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Variables de Sistema">
  <title>Variables de Sistema</title>
  <defs>
    <radialGradient id="brace" cx="32%" cy="25%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#CCFBF1"/>
      <stop offset="28%"  stop-color="#6ee7b7"/>
      <stop offset="60%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </radialGradient>
    <radialGradient id="spec" cx="32%" cy="25%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="shd" x="-20%" y="-18%" width="140%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#134e4a" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Left curly brace { -->
    <path d="M18,6 Q12,6 12,10 L12,18 Q12,23 7,24 Q12,25 12,30 L12,38 Q12,42 18,42"
      fill="none" stroke="url(#brace)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right curly brace } -->
    <path d="M30,6 Q36,6 36,10 L36,18 Q36,23 41,24 Q36,25 36,30 L36,38 Q36,42 30,42"
      fill="none" stroke="url(#brace)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Specular on left brace (top arc) -->
    <path d="M18,6 Q13,7 12,11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.48"/>
    <!-- Specular on right brace (top arc) -->
    <path d="M30,6 Q35,7 36,11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
    <!-- Center $ variable symbol -->
    <text x="17.5" y="28" font-size="14" font-weight="800" fill="url(#brace)"
      font-family="'Courier New',monospace,system-ui">$x</text>
    <!-- Variable dot/cursor indicator -->
    <circle cx="24" cy="24" r="3.5" fill="url(#dot)"/>
    <circle cx="23" cy="23" r="1.3" fill="white" opacity="0.50"/>
  </g>
</svg>
