<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Personajes">
  <title>Personajes</title>
  <defs>
    <!-- Comedy mask (front, larger) -->
    <radialGradient id="comedy" cx="35%" cy="28%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FCE7F3"/>
      <stop offset="28%"  stop-color="#f9a8d4"/>
      <stop offset="60%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#831843"/>
    </radialGradient>
    <!-- Tragedy mask (back, darker) -->
    <radialGradient id="tragedy" cx="35%" cy="28%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FEE2E2"/>
      <stop offset="30%"  stop-color="#fca5a5"/>
      <stop offset="65%"  stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="spec" cx="32%" cy="25%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shd" x="-20%" y="-18%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#831843" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Tragedy mask (behind, offset right-down) -->
    <!-- Mask oval -->
    <ellipse cx="29" cy="27" rx="14" ry="16" fill="url(#tragedy)"/>
    <ellipse cx="29" cy="27" rx="14" ry="16" fill="url(#spec)" opacity="0.60"/>
    <!-- Tragedy eyes (eye holes — dark oval) -->
    <ellipse cx="24" cy="22" rx="3.2" ry="2.5" fill="#7f1d1d" opacity="0.60"/>
    <ellipse cx="34" cy="22" rx="3.2" ry="2.5" fill="#7f1d1d" opacity="0.60"/>
    <!-- Tragedy mouth (frown) -->
    <path d="M23,32 Q29,28 35,32" fill="none" stroke="#7f1d1d" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
    <!-- Tragedy top highlight -->
    <path d="M20,14 Q29,11 38,16" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.38"/>

    <!-- Comedy mask (front, offset left-up) -->
    <ellipse cx="20" cy="22" rx="14" ry="16" fill="url(#comedy)"/>
    <ellipse cx="20" cy="22" rx="14" ry="16" fill="url(#spec)"/>
    <!-- Comedy top highlight -->
    <path d="M11,10 Q20,7 29,12" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    <!-- Comedy eyes (eye holes) -->
    <ellipse cx="15" cy="17" rx="3.2" ry="2.5" fill="#831843" opacity="0.55"/>
    <ellipse cx="25" cy="17" rx="3.2" ry="2.5" fill="#831843" opacity="0.55"/>
    <!-- Comedy eye shine -->
    <circle cx="13.5" cy="16" r="1" fill="white" opacity="0.45"/>
    <circle cx="23.5" cy="16" r="1" fill="white" opacity="0.45"/>
    <!-- Comedy mouth (smile) -->
    <path d="M13,26 Q20,32 27,26" fill="none" stroke="#831843" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
    <!-- Smile fill (teeth area) -->
    <path d="M13,26 Q20,32 27,26 Q20,34 13,26 Z" fill="white" opacity="0.22"/>
  </g>
</svg>
