<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Chevron">
  <title>Chevron</title>
  <defs>
    <linearGradient id="arr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F9FAFB"/>
      <stop offset="35%"  stop-color="#9ca3af"/>
      <stop offset="70%"  stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shd" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#111827" flood-opacity="0.38"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Chevron as a filled shape (not just a stroke) for more volume -->
    <path d="M12,8 L32,24 L12,40 L16,44 L40,24 L16,4 Z" fill="url(#arr)"/>
    <!-- Left edge highlight (lit face) -->
    <path d="M12,8 L16,4 L40,24 L36,24 Z" fill="white" opacity="0.22"/>
    <!-- Bottom edge -->
    <path d="M12,40 L16,44 L40,24 L36,24 Z" fill="white" opacity="0.08"/>
    <!-- Top bright edge line -->
    <line x1="16" y1="4" x2="40" y2="24" stroke="white" stroke-width="1.2" opacity="0.48"/>
  </g>
</svg>
