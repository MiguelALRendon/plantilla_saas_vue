<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Productos">
  <title>Productos</title>
  <defs>
    <radialGradient id="bag" cx="32%" cy="20%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#CCFBF1"/>
      <stop offset="30%"  stop-color="#8fc9cf"/>
      <stop offset="65%"  stop-color="#52b5bc"/>
      <stop offset="100%" stop-color="#164e63"/>
    </radialGradient>
    <radialGradient id="spec" cx="32%" cy="20%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#52b5bc"/>
    </linearGradient>
    <filter id="shd" x="-18%" y="-15%" width="136%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#164e63" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Handle arc (behind bag body, drawn first) -->
    <path d="M14,22 Q14,7 24,7 Q34,7 34,22"
      fill="none" stroke="url(#handle)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Handle inner highlight -->
    <path d="M16,22 Q16,10 24,10 Q32,10 32,22"
      fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Bag body (trapezoid) -->
    <path d="M6,22 L42,22 L38,44 L10,44 Z" fill="url(#bag)"/>
    <!-- Specular overlay on bag body -->
    <path d="M6,22 L42,22 L38,44 L10,44 Z" fill="url(#spec)"/>
    <!-- Top fold highlight -->
    <path d="M6,22 L42,22 L41,26 L7,26 Z" fill="white" opacity="0.22"/>
    <!-- Top edge bright line -->
    <line x1="6" y1="22" x2="42" y2="22" stroke="white" stroke-width="1" opacity="0.55"/>
    <!-- Brand tag mark -->
    <rect x="18" y="32" width="12" height="7" rx="3.5" fill="#164e63" opacity="0.40"/>
    <rect x="18" y="32" width="12" height="3" rx="3.5" fill="white" opacity="0.20"/>
  </g>
</svg>
