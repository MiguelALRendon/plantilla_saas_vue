<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Capítulos">
  <title>Capítulos</title>
  <defs>
    <!-- Back page -->
    <linearGradient id="pg3" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <!-- Mid page -->
    <linearGradient id="pg2" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#E0F2FE"/>
      <stop offset="40%"  stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <!-- Front page (brightest) -->
    <radialGradient id="pg1" cx="32%" cy="22%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F0F9FF"/>
      <stop offset="30%"  stop-color="#bae6fd"/>
      <stop offset="65%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <radialGradient id="spec" cx="32%" cy="22%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shd" x="-15%" y="-12%" width="130%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#0c4a6e" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Back page (bottom, most rotated) -->
    <rect x="10" y="5" width="32" height="38" rx="2.5" fill="url(#pg3)" transform="rotate(-8 26 24)"/>
    <!-- Mid page -->
    <rect x="8"  y="6" width="32" height="38" rx="2.5" fill="url(#pg2)" transform="rotate(-4 24 25)"/>
    <!-- Front page (top, straight) -->
    <rect x="6" y="7" width="32" height="38" rx="2.5" fill="url(#pg1)"/>
    <!-- Specular on front -->
    <rect x="6" y="7" width="32" height="38" rx="2.5" fill="url(#spec)"/>
    <!-- Chapter lines on front page -->
    <!-- Chapter I marker -->
    <text x="10" y="20" font-size="7" font-weight="700" fill="white" opacity="0.80"
      font-family="system-ui,-apple-system,sans-serif">I.</text>
    <rect x="18" y="16" width="16" height="2"   rx="1" fill="white" opacity="0.50"/>
    <rect x="18" y="19.5" width="11" height="1.5" rx="0.75" fill="white" opacity="0.35"/>
    <!-- Chapter II marker -->
    <text x="10" y="30" font-size="7" font-weight="700" fill="white" opacity="0.80"
      font-family="system-ui,-apple-system,sans-serif">II.</text>
    <rect x="18" y="26" width="14" height="2"   rx="1" fill="white" opacity="0.50"/>
    <rect x="18" y="29.5" width="10" height="1.5" rx="0.75" fill="white" opacity="0.35"/>
    <!-- Chapter III marker -->
    <text x="10" y="40" font-size="7" font-weight="700" fill="white" opacity="0.80"
      font-family="system-ui,-apple-system,sans-serif">III.</text>
    <rect x="20" y="36" width="12" height="2"   rx="1" fill="white" opacity="0.50"/>
    <!-- Top edge highlight -->
    <line x1="6" y1="7" x2="38" y2="7" stroke="white" stroke-width="1" opacity="0.55"/>
  </g>
</svg>
