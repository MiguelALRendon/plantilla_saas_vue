<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48" role="img" aria-label="Logo">
  <title>Logo</title>
  <defs>
    <radialGradient id="ico" cx="35%" cy="25%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FBCFE8"/>
      <stop offset="28%"  stop-color="#f472b6"/>
      <stop offset="65%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#831843"/>
    </radialGradient>
    <radialGradient id="ispec" cx="35%" cy="25%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f33f8a"/>
      <stop offset="100%" stop-color="#8660b3"/>
    </linearGradient>
    <filter id="shd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#831843" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Icon mark — floating S shape (no tile) -->
  <g filter="url(#shd)">
    <!-- S path built from two arcs + fill -->
    <path d="M14,18 Q14,8 24,8 Q34,8 34,16 Q34,22 24,24 Q14,26 14,33 Q14,42 24,42 Q34,42 34,35"
      fill="none" stroke="url(#ico)" stroke-width="7" stroke-linecap="round"/>
    <!-- Specular line on S -->
    <path d="M16,18 Q16,10 24,10 Q31,10 32,14"
      fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  </g>
  <!-- Wordmark -->
  <text x="48" y="31" font-size="21" font-weight="700" fill="url(#word)"
    font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif" letter-spacing="-0.5">SaaS</text>
  <text x="99" y="31" font-size="21" font-weight="400" fill="#6b7280"
    font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif" letter-spacing="-0.3"> App</text>
</svg>
