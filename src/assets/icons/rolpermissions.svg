<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Roles y permisos">
  <title>Roles y permisos</title>
  <defs>
    <radialGradient id="shield" cx="35%" cy="22%" r="78%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FEE2E2"/>
      <stop offset="28%"  stop-color="#f87171"/>
      <stop offset="65%"  stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="spec" cx="35%" cy="22%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.48"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shd" x="-20%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#7f1d1d" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Shield outer shape -->
    <path d="M24,3 L42,10 L42,26 Q42,40 24,46 Q6,40 6,26 L6,10 Z"
      fill="url(#shield)"/>
    <!-- Specular highlight -->
    <path d="M24,3 L42,10 L42,26 Q42,40 24,46 Q6,40 6,26 L6,10 Z"
      fill="url(#spec)"/>
    <!-- Inner shield panel (lighter inset) -->
    <path d="M24,8 L38,14 L38,26 Q38,37 24,42 Q10,37 10,26 L10,14 Z"
      fill="white" opacity="0.12"/>
    <!-- Top edge highlight -->
    <path d="M24,3 L42,10" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>
    <path d="M24,3 L6,10" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <!-- Lock body -->
    <rect x="18" y="27" width="12" height="12" rx="3" fill="#7f1d1d" opacity="0.52"/>
    <!-- Lock highlight top face -->
    <rect x="18" y="27" width="12" height="4" rx="3" fill="white" opacity="0.20"/>
    <!-- Lock shackle -->
    <path d="M20.5,27 L20.5,23 Q24,18.5 27.5,23 L27.5,27"
      fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.85"/>
    <!-- Keyhole -->
    <circle cx="24" cy="32.5" r="2.3" fill="white" opacity="0.82"/>
    <rect x="23.1" y="32.5" width="1.8" height="3.8" rx="0.9" fill="white" opacity="0.82"/>
  </g>
</svg>
