<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Argos Argumentales">
  <title>Argos Argumentales</title>
  <defs>
    <radialGradient id="node-main" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FED7AA"/>
      <stop offset="40%"  stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </radialGradient>
    <radialGradient id="node-sm" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FFEDD5"/>
      <stop offset="40%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="spec" cx="35%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shd" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#9a3412" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Connecting arcs (drawn behind nodes) -->
    <!-- Left-to-center arc (upper) -->
    <path d="M10,28 Q18,10 28,22" fill="none" stroke="url(#arc1)" stroke-width="3" stroke-linecap="round" opacity="0.80"/>
    <!-- Center-to-right arc (upper) -->
    <path d="M28,22 Q36,12 40,24" fill="none" stroke="url(#arc2)" stroke-width="3" stroke-linecap="round" opacity="0.80"/>
    <!-- Left-to-center arc (lower branch) -->
    <path d="M10,28 Q18,42 28,36" fill="none" stroke="url(#arc1)" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
    <!-- Center-to-right branch lower -->
    <path d="M28,36 Q36,44 40,38" fill="none" stroke="url(#arc2)" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
    <!-- Arrow heads -->
    <polygon points="28,22 23,18 24,24" fill="#fb923c" opacity="0.85"/>
    <polygon points="40,24 35,21 36,26" fill="#fb923c" opacity="0.85"/>
    <polygon points="28,36 22,34 24,39" fill="#f97316" opacity="0.60"/>
    <polygon points="40,38 35,35 36,40" fill="#f97316" opacity="0.60"/>
    <!-- Left start node (small) -->
    <circle cx="10" cy="28" r="6"   fill="url(#node-sm)"/>
    <circle cx="10" cy="28" r="6"   fill="url(#spec)"/>
    <circle cx="8.2" cy="26.2" r="2.2" fill="white" opacity="0.42"/>
    <!-- Center node (large — climax) -->
    <circle cx="28" cy="22" r="9"   fill="url(#node-main)"/>
    <circle cx="28" cy="22" r="9"   fill="url(#spec)"/>
    <circle cx="25.5" cy="19.5" r="3.5" fill="white" opacity="0.40"/>
    <!-- Center lower branch node -->
    <circle cx="28" cy="36" r="6"   fill="url(#node-sm)"/>
    <circle cx="28" cy="36" r="6"   fill="url(#spec)"/>
    <!-- Right end nodes -->
    <circle cx="40" cy="24" r="5"   fill="url(#node-sm)"/>
    <circle cx="40" cy="24" r="5"   fill="url(#spec)"/>
    <circle cx="40" cy="38" r="4"   fill="url(#node-sm)" opacity="0.80"/>
  </g>
</svg>
