<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Notificaciones">
  <title>Notificaciones</title>
  <defs>
    <radialGradient id="bell" cx="35%" cy="22%" r="78%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#EDE9FE"/>
      <stop offset="28%"  stop-color="#c4b5fd"/>
      <stop offset="60%"  stop-color="#8660b3"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="spec" cx="35%" cy="22%" r="58%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="notif-dot" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </radialGradient>
    <linearGradient id="mouth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="shd" x="-20%" y="-18%" width="140%" height="145%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#4c1d95" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#shd)">
    <!-- Bell body -->
    <path d="M24,6 Q24,6 24,6 C14,6 8,14 8,22 L8,34 Q8,36 10,36 L38,36 Q40,36 40,34 L40,22 C40,14 34,6 24,6 Z"
      fill="url(#bell)"/>
    <!-- Bell specular -->
    <path d="M24,6 Q24,6 24,6 C14,6 8,14 8,22 L8,34 Q8,36 10,36 L38,36 Q40,36 40,34 L40,22 C40,14 34,6 24,6 Z"
      fill="url(#spec)"/>
    <!-- Bell top edge (lit) -->
    <path d="M18,8 Q24,5 30,8" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    <!-- Bell mouth (wider bottom arc) -->
    <path d="M6,36 Q6,40 24,40 Q42,40 42,36" fill="url(#mouth)" opacity="0.90"/>
    <path d="M6,36 Q6,38 24,38 Q42,38 42,36" fill="white" opacity="0.18"/>
    <!-- Clapper -->
    <circle cx="24" cy="41.5" r="3.5" fill="url(#bell)"/>
    <circle cx="23" cy="40.5" r="1.2" fill="white" opacity="0.40"/>
    <!-- Mount ring at top -->
    <path d="M21,6 Q24,2 27,6" fill="none" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M22,5.5 Q24,3.5 26,5.5" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <!-- Side highlights for 3D shape feel -->
    <path d="M8,22 Q8,16 14,11" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.28"/>
    <!-- Notification dot (top right) -->
    <circle cx="38" cy="11" r="6.5" fill="url(#notif-dot)"/>
    <circle cx="36.8" cy="9.8" r="2.2" fill="white" opacity="0.45"/>
  </g>
</svg>
